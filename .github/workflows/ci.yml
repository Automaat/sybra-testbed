name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - run: npm install
      - name: Boot the app and probe baseline endpoints
        run: |
          PORT=3000 node server.js &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            curl -fsS localhost:3000/healthz >/dev/null 2>&1 && break
            sleep 0.25
          done
          curl -fsS localhost:3000/healthz | grep -qx ok
          curl -fsS localhost:3000/ | grep -qx 'sybra-testbed ok'
          kill "$SERVER_PID"
